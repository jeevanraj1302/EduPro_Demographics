version: "3.9"

services:
  edupro-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edupro-demographics
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro
      - ./outputs:/app/outputs
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
